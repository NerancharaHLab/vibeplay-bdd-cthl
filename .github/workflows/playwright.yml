name: Playwright Tests CI/CD
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: [new-cortex, tmh, sbh, nuh]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests
      env:
        SITE: ${{ matrix.site }}
      run: |
        if [ "${{ matrix.site }}" = "new-cortex" ]; then
          npx playwright test tests/new-cortex --headless
        else
          npx playwright test tests/${{ matrix.site }}/login.spec.ts --headless
        fi

    - name: Upload Test Report Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.site }}
        path: playwright-report/
        retention-days: 30
